openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: World Developer Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: docs
    description: Documentation content
  - name: changelog
    description: Changelog and release notes
  - name: sdk
    description: SDK and tools information
  - name: contact
    description: Contact and support
  - name: stats
    description: Ecosystem statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /docs/sections:
    get:
      operationId: getDocSections
      tags: [docs]
      summary: Get documentation sections
      description: Returns all top-level documentation sections with metadata
      responses:
        "200":
          description: List of documentation sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocSection"

  /docs/sections/{slug}:
    get:
      operationId: getDocSection
      tags: [docs]
      summary: Get a specific documentation section
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Documentation section with articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocSectionDetail"
        "404":
          description: Not found

  /docs/search:
    get:
      operationId: searchDocs
      tags: [docs]
      summary: Search documentation
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocSearchResult"

  /changelog:
    get:
      operationId: getChangelog
      tags: [changelog]
      summary: Get changelog entries
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
            enum: [sdk, api, protocol, portal, all]
      responses:
        "200":
          description: List of changelog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangelogEntry"

  /sdks:
    get:
      operationId: getSdks
      tags: [sdk]
      summary: Get available SDKs
      description: Returns all SDKs and tools available for developers
      responses:
        "200":
          description: List of SDKs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SdkInfo"

  /sdks/{id}:
    get:
      operationId: getSdk
      tags: [sdk]
      summary: Get SDK details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SDK details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SdkDetail"
        "404":
          description: Not found

  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit a contact or inquiry form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormInput"
      responses:
        "200":
          description: Form submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResult"

  /stats/ecosystem:
    get:
      operationId: getEcosystemStats
      tags: [stats]
      summary: Get ecosystem statistics
      description: Returns high-level ecosystem statistics for the portal homepage
      responses:
        "200":
          description: Ecosystem statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EcosystemStats"

  /stats/api-status:
    get:
      operationId: getApiStatus
      tags: [stats]
      summary: Get API endpoint statuses
      description: Returns current status of all major API endpoints
      responses:
        "200":
          description: API status information
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiEndpointStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DocSection:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        articleCount:
          type: integer
        category:
          type: string
          enum: [getting-started, core-concepts, api-reference, sdks, guides, support]
        status:
          type: string
          enum: [stable, beta, draft, planned]
        order:
          type: integer
      required:
        - id
        - slug
        - title
        - description
        - icon
        - articleCount
        - category
        - status
        - order

    DocArticle:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [stable, beta, draft, planned]
        lastUpdated:
          type: string
          format: date-time
        estimatedReadTime:
          type: integer
          description: Read time in minutes
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - slug
        - title
        - description
        - content
        - status
        - lastUpdated
        - estimatedReadTime
        - tags

    DocSectionDetail:
      allOf:
        - $ref: "#/components/schemas/DocSection"
        - type: object
          properties:
            articles:
              type: array
              items:
                $ref: "#/components/schemas/DocArticle"
          required:
            - articles

    DocSearchResult:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        sectionTitle:
          type: string
        sectionSlug:
          type: string
        slug:
          type: string
        relevance:
          type: number
      required:
        - id
        - title
        - description
        - sectionTitle
        - sectionSlug
        - slug
        - relevance

    ChangelogEntry:
      type: object
      properties:
        id:
          type: string
        version:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [sdk, api, protocol, portal]
        type:
          type: string
          enum: [feature, fix, breaking, deprecation, improvement]
        date:
          type: string
          format: date-time
        links:
          type: array
          items:
            $ref: "#/components/schemas/ChangelogLink"
      required:
        - id
        - version
        - title
        - description
        - category
        - type
        - date
        - links

    ChangelogLink:
      type: object
      properties:
        label:
          type: string
        url:
          type: string
      required:
        - label
        - url

    SdkInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        language:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [stable, beta, alpha, planned]
        githubUrl:
          type: string
        npmUrl:
          type: string
        docsUrl:
          type: string
        weeklyDownloads:
          type: integer
        icon:
          type: string
      required:
        - id
        - name
        - description
        - language
        - version
        - status
        - icon

    SdkDetail:
      allOf:
        - $ref: "#/components/schemas/SdkInfo"
        - type: object
          properties:
            installCommand:
              type: string
            quickstartCode:
              type: string
            features:
              type: array
              items:
                type: string
            changelog:
              type: array
              items:
                $ref: "#/components/schemas/ChangelogEntry"
          required:
            - installCommand
            - quickstartCode
            - features
            - changelog

    ContactFormInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        type:
          type: string
          enum: [general, partner, orb-provider, integration, bug-report, enterprise]
        subject:
          type: string
        message:
          type: string
        company:
          type: string
      required:
        - name
        - email
        - type
        - subject
        - message

    ContactFormResult:
      type: object
      properties:
        success:
          type: boolean
        ticketId:
          type: string
        message:
          type: string
      required:
        - success
        - ticketId
        - message

    EcosystemStats:
      type: object
      properties:
        verifiedHumans:
          type: integer
        countriesActive:
          type: integer
        registeredApps:
          type: integer
        totalTransactions:
          type: integer
        weeklyActiveUsers:
          type: integer
        orbLocations:
          type: integer
      required:
        - verifiedHumans
        - countriesActive
        - registeredApps
        - totalTransactions
        - weeklyActiveUsers
        - orbLocations

    ApiEndpointStatus:
      type: object
      properties:
        name:
          type: string
        endpoint:
          type: string
        status:
          type: string
          enum: [operational, degraded, outage, maintenance]
        latencyMs:
          type: integer
        uptime:
          type: number
          description: Uptime percentage over last 30 days
        lastChecked:
          type: string
          format: date-time
      required:
        - name
        - endpoint
        - status
        - latencyMs
        - uptime
        - lastChecked
